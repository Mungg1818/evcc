template: huawei-emma
products:
  - brand: Huawei
    description:
      generic: EMMA
params:
  - name: usage
    choice: ["grid", "pv", "battery"]
  - name: modbus
    choice: ["tcpip"]
  # - name: storageunit
  - preset: battery-params
render: |
  type: custom
  {{- if eq .usage "grid" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 31657 # Active power of built-in electric energy sensor
      type: holding
      decode: int32
  energy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 31679 # Total negative active energy of built-in electric energy sensor
      type: holding
      decode: int64
    scale: 0.01
  currents:
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 31651 # Huawei phase A grid current
      type: holding
      decode: int32
    scale: 0.1
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 31653 # Huawei phase B grid current
      type: holding
      decode: int32
    scale: 0.1
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 31655 # Huawei phase C grid current
      type: holding
      decode: int32
    scale: 0.1
  {{- end }}
  {{- if eq .usage "pv" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 30354 # Active power
      type: holding
      decode: int32
  energy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 30344 # E-Total
      type: holding
      decode: uint32
    scale: 0.01
  {{- end }}
  {{- if eq .usage "battery" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 30360
      type: holding
      decode: int32nan
    scale: -1
  energy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 30312 # Total discharge
      type: holding
      decode: uint32nan
    scale: 0.01
  soc:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 30368
      type: holding
      decode: uint16nan
    scale: 0.01
  batterymode:
    source: watchdog
    timeout: 30s
    reset: 1 # reset watchdog on normal
    set:
      source: switch
      switch:
      - case: 1 # normal
        set:
          source: sequence
          set:
          - source: const
            value: 2 # maximum self-consumption
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 40000 # ESS control mode
                type: writesingle
                encoding: uint16
      - case: 2 # hold
        set:
          source: sequence
          set:
          - source: const
            value: 5 # time of use mode
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 40000 # ESS control mode
                type: writesingle
                encoding: uint16
          - source: const
            value: 0 # W
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 40002 # Maximum power for charging batteries from grid
                type: writesingle
                encoding: uint16
          - source: const
            # value: 1 # Minute
            value: tou_block:
              - 0 # [0] Reserved
              - 1 # [1] Period count
              - 0 # [2] Time block 1 start time
              - 1439 # [3] Time block 1 end time
              - 383 # [4] Charging and every weekday
              - 0 # [5] padding
              - 0 # [6] padding
              - 0 # [7] padding
              - 0 # [8] padding
              - 0 # [9] padding
              - 0 # [10] padding
              - 0 # [11] padding
              - 0 # [12] padding
              - 0 # [13] padding
              - 0 # [14] padding
              - 0 # [15] padding
              - 0 # [16] padding
              - 0 # [17] padding
              - 0 # [18] padding
              - 0 # [19] padding
              - 0 # [20] padding
              - 0 # [21] padding
              - 0 # [22] padding
              - 0 # [23] padding
              - 0 # [24] padding
              - 0 # [25] padding
              - 0 # [26] padding
              - 0 # [27] padding
              - 0 # [28] padding
              - 0 # [29] padding
              - 0 # [30] padding
              - 0 # [31] padding
              - 0 # [32] padding
              - 0 # [33] padding
              - 0 # [34] padding
              - 0 # [35] padding
              - 0 # [36] padding
              - 0 # [37] padding
              - 0 # [38] padding
              - 0 # [39] padding
              - 0 # [40] padding
              - 0 # [41] padding
              - 0 # [42] padding
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 40004 # Charge / discharge time window
                type: holding
                length: 43
                encoding: uint16
      - case: 3 # charge
        set:
          source: sequence
          set:
          - source: const
            value: 1 # charge
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 47100 # Forcible charge/discharge
                type: writesingle
                encoding: uint16
          - source: const
            value: 0 # duration
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 47246 # Forcible charge/discharge setting mode
                type: writesingle
                encoding: uint16
          - source: const
            value: 1 # Minute
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 47083 # Forced charging and discharging period
                type: writesingle
                encoding: uint16
          - source: const
            value: {{ .maxchargepower }} # W
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 47247 # Forcible charge power
                type: writemultiple
                encoding: uint32
          - source: const
            value: 1 # Enable
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 47087 # Charge from grid
                type: writesingle
                encoding: uint16
  {{- include "battery-params" . }}
  {{- end }}
