template: huawei-emma
products:
  - brand: Huawei
    description:
      generic: EMMA
capabilities: ["battery-control"]
params:
  - name: usage
    choice: ["grid", "pv", "battery"]
  - name: modbus
    choice: ["tcpip"]
  - name: maxacpower
  - name: storageunit
  - preset: battery-params
  - name: timeout
render: |
  type: custom
  {{- if eq .usage "grid" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 31657 # Active power of built-in electric energy sensor
      type: holding
      decode: int32
  energy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 31679 # Total negative active energy of built-in electric energy sensor
      type: holding
      decode: int64
    scale: 0.01
  currents:
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 31651 # Huawei phase A grid current
      type: holding
      decode: int32
    scale: 0.1
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 31653 # Huawei phase B grid current
      type: holding
      decode: int32
    scale: 0.1
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 31655 # Huawei phase C grid current
      type: holding
      decode: int32
    scale: 0.1
  {{- end }}
  {{- if eq .usage "pv" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 30354 # Active power
      type: holding
      decode: int32
  energy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 30344 # E-Total
      type: holding
      decode: uint32
    scale: 0.01
  {{- end }}
  {{- if eq .usage "battery" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 30360
      type: holding
      decode: int32nan
    scale: -1
  energy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 30312 # Total discharge
      type: holding
      decode: uint32nan
    scale: 0.01
  soc:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 30368
      type: holding
      decode: uint16nan
    scale: 0.01
  batterymode:
    source: watchdog
    timeout: 30s
    reset: 2 # reset watchdog on normal
    set:
      source: switch
      switch:
      - case: 1 # normal
        set:
          source: const
          value: 2 # maximum self-consumption
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 40000 # ESS control mode
              type: writesingle
              encoding: uint16
      - case: 2 # hold
        set:
          source: sequence
          set:
          - source: const
            value: 5 # time of use mode
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 40000 # ESS control mode
                type: writesingle
                encoding: uint16
          - source: const
            value: 0 # W
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 40002 # Maximum power for charging batteries from grid
                type: writesingle
                encoding: uint16
      - case: 3 # charge
        set:
          source: sequence
          set:
          - source: const
            value: 2 # charge
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 40000 # Forcible charge/discharge
                type: writesingle
                encoding: uint16
  {{- include "battery-params" . }}
  {{- end }}
